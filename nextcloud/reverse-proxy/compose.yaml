version: "3.9"

services:
  caddy:
    image: caddy:alpine
    restart: always
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nextcloud-aio
    env_file:
      - .env
    volumes:
      - caddy_certs:/certs
      - caddy_config:/config
      - caddy_data:/data
      - caddy_sites:/srv
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

networks:
  nextcloud-aio:
    external: true

volumes:
  caddy_certs:
  caddy_config:
  caddy_data:
  caddy_sites:
